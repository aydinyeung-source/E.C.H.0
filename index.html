<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>E.C.H.0</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Full-viewport WebGL surface. -->
    <canvas id="scene"></canvas>

    <!-- Center reticle, only meaningful once pointer-locked. -->
    <div class="crosshair" aria-hidden="true"></div>

    <!-- Start / pause overlay. Shown until the pointer is locked. -->
    <div class="overlay" id="startOverlay">
      <div class="panel">
        <h1>E.C.H.0</h1>
        <p class="tagline">You are somewhere you shouldn't be.</p>
        <ul class="controls">
          <li><span>Move</span><strong>W&nbsp;A&nbsp;S&nbsp;D</strong></li>
          <li><span>Look</span><strong>Mouse</strong></li>
          <li><span>Sonar pulse</span><strong>Click</strong></li>
          <li><span>Release cursor</span><strong>Esc</strong></li>
        </ul>

        <div class="field">
          <label for="seedInput">Seed <span class="sub">(blank = random)</span></label>
          <input id="seedInput" type="text" maxlength="32" placeholder="type anything…" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label for="sensSlider">Look sensitivity <span id="sensValue" class="sub">1.0x</span></label>
          <input id="sensSlider" type="range" min="0.4" max="2.5" step="0.05" value="1" />
        </div>

        <div class="overlay-actions">
          <button id="startButton">Enter</button>
          <button id="dailyButton" class="secondary">Daily Challenge</button>
        </div>
        <p class="hint">The dark only answers when you call to it.</p>
      </div>
    </div>

    <div class="seed-tag" id="seedTag"></div>
    <div class="version-tag" id="versionTag"></div>

    <!-- Three.js (UMD build) exposes a global `THREE` before our modules run. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="./game.js"></script>
  </body>
</html>
