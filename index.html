<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>E.C.H.0</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Full-viewport WebGL surface. -->
    <canvas id="scene"></canvas>

    <!-- Center reticle + live distance readout, only meaningful once locked. -->
    <div class="crosshair" aria-hidden="true"></div>
    <div class="distance-tag" id="distanceTag"></div>

    <!-- Energy meter (shown while playing). -->
    <div class="hud-energy hidden" id="energyBar">
      <span class="hud-energy-label">ENERGY</span>
      <div class="hud-energy-track"><div class="hud-energy-fill" id="energyFill"></div></div>
    </div>

    <!-- Sonar radar (bottom-right, shown while playing). -->
    <canvas id="radar" class="radar hidden" width="180" height="180"></canvas>

    <!-- Home screen. Shown until the pointer is locked. Corner panels for
         settings (top-left) and account (top-right); play controls centered. -->
    <div class="overlay" id="startOverlay">
      <!-- Top-left: settings -->
      <div class="menu-panel top-left">
        <h2 class="panel-title">⚙ Settings</h2>
        <div class="field">
          <label for="sensSlider">Look sensitivity <span id="sensValue" class="sub">1.0x</span></label>
          <input id="sensSlider" type="range" min="0.4" max="2.5" step="0.05" value="1" />
        </div>
        <div class="field">
          <label for="sonarKey">Sonar key</label>
          <select id="sonarKey">
            <option value="mouse0">Left click</option>
            <option value="mouse2">Right click</option>
            <option value="Space">Spacebar</option>
            <option value="KeyE">E</option>
            <option value="KeyF">F</option>
          </select>
        </div>
        <p class="controls-hint">WASD move · Mouse look · Esc release</p>
        <p class="panel-version">Build <strong id="versionLabel">—</strong></p>
      </div>

      <!-- Top-right: account -->
      <div class="menu-panel top-right">
        <div id="authForms">
          <div class="auth-tabs">
            <button id="tabLogin" class="tab active" type="button">Log in</button>
            <button id="tabSignup" class="tab" type="button">Sign up</button>
          </div>
          <input id="authUsername" type="text" maxlength="20" placeholder="username" autocomplete="username" spellcheck="false" />
          <input id="authPassword" type="password" placeholder="password" autocomplete="current-password" />
          <input id="authConfirm" class="hidden" type="password" placeholder="confirm password" autocomplete="new-password" />
          <button id="authSubmit" type="button">Log in</button>
          <p id="authMsg" class="auth-msg"></p>
        </div>
        <div id="authUserBox" class="hidden">
          <span>Signed in as <strong id="authUserLabel"></strong></span>
          <button id="logoutButton" class="secondary small" type="button">Log out</button>
        </div>
      </div>

      <!-- Center: title, seed, play -->
      <div class="menu-center">
        <h1>E.C.H.0</h1>
        <p class="tagline">You are somewhere you shouldn't be.</p>

        <div class="field seed-field">
          <label for="seedInput">Seed <span class="sub">(blank = random)</span></label>
          <input id="seedInput" type="text" maxlength="32" placeholder="type anything…" autocomplete="off" spellcheck="false" />
        </div>

        <div class="overlay-actions">
          <button id="startButton" type="button">Enter</button>
          <button id="dailyButton" class="secondary" type="button">Daily Challenge</button>
        </div>

        <div class="leaderboard">
          <h3>Daily Top 10 <span class="sub">· distance explored</span></h3>
          <ol id="leaderboardList"></ol>
        </div>
      </div>
    </div>

    <!-- Game-over overlay, shown when an entity catches the player. -->
    <div class="overlay hidden" id="gameOverOverlay">
      <div class="panel">
        <h1 class="dead-title">TAKEN</h1>
        <p class="tagline">Something found you in the dark.</p>
        <p class="dead-stat">You explored <strong id="gameOverDistance">0m</strong></p>
        <button id="tryAgainButton" type="button">Try Again</button>
      </div>
    </div>

    <!-- Pause overlay (Esc): black background, resume or bail to home. -->
    <div class="overlay hidden" id="pauseOverlay">
      <div class="panel">
        <h1>PAUSED</h1>
        <p class="tagline">The dark waits.</p>
        <div class="overlay-actions">
          <button id="resumeButton" type="button">Resume</button>
          <button id="homeButton" class="secondary" type="button">Home</button>
        </div>
      </div>
    </div>

    <!-- Jumpscare, shown for a beat the instant an entity catches you. -->
    <div id="jumpscare" class="hidden" aria-hidden="true">
      <div class="js-face">
        <div class="js-eye left"></div>
        <div class="js-eye right"></div>
        <div class="js-mouth"></div>
      </div>
    </div>

    <div class="seed-tag" id="seedTag"></div>
    <div class="version-tag" id="versionTag"></div>

    <!-- Supabase config (blank keys => offline). Classic script runs first so
         window.SUPABASE_* is set before the modules read it. -->
    <script src="./config.js"></script>
    <!-- Three.js (UMD build) exposes a global `THREE` before our modules run. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="./game.js"></script>
  </body>
</html>
